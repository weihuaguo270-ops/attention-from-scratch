<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 560" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Decoder-only 架构（GPT 风格）</text>

  <!-- Input box -->
  <rect x="260" y="55" width="180" height="45" rx="6" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="350" y="82" text-anchor="middle" font-size="14" fill="#1e293b">输入 (seq, d_model)</text>

  <!-- Arrow -->
  <line x1="350" y1="100" x2="350" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PE -->
  <rect x="260" y="125" width="180" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="350" y="149" text-anchor="middle" font-size="14" fill="#1e293b">Positional Encoding</text>

  <line x1="350" y1="165" x2="350" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Transformer Block -->
  <rect x="240" y="190" width="220" height="155" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="350" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Transformer Block × N</text>
  <line x1="260" y1="225" x2="440" y2="225" stroke="#ddd" stroke-width="0.5"/>
  <text x="350" y="245" text-anchor="middle" font-size="13" fill="#475569">Multi-Head Self-Attention</text>
  <text x="350" y="263" text-anchor="middle" font-size="12" fill="#94a3b8">（因果掩码）</text>
  <text x="350" y="285" text-anchor="middle" font-size="13" fill="#475569">+ 残差连接 + LayerNorm</text>
  <text x="350" y="310" text-anchor="middle" font-size="13" fill="#475569">FFN → + 残差 + LayerNorm</text>
  <text x="350" y="330" text-anchor="middle" font-size="11" fill="#94a3b8">（可堆叠 N 层）</text>

  <line x1="350" y1="345" x2="350" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- KV Cache -->
  <rect x="260" y="370" width="180" height="40" rx="6" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="350" y="394" text-anchor="middle" font-size="14" fill="#1e293b">KV Cache（推理加速）</text>

  <line x1="350" y1="410" x2="350" y2="435" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="260" y="435" width="180" height="45" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="350" y="462" text-anchor="middle" font-size="14" fill="#1e293b">输出 → 预测下一个词</text>

  <!-- Autoregressive loop arrow -->
  <line x1="440" y1="458" x2="480" y2="458" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="480" y1="458" x2="480" y2="75" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="480" y1="75" x2="443" y2="75" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="495" y="270" font-size="12" fill="#94a3b8" transform="rotate(90, 495, 270)">自回归循环</text>

  <!-- Legend -->
  <rect x="20" y="490" width="660" height="55" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="35" y="510" font-size="12" font-weight="bold" fill="#475569">图例：</text>
  <rect x="80" y="498" width="12" height="12" rx="2" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="96" y="508" font-size="11" fill="#64748b">输入</text>
  <rect x="140" y="498" width="12" height="12" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="156" y="508" font-size="11" fill="#64748b">位置编码</text>
  <rect x="230" y="498" width="12" height="12" rx="2" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
  <text x="246" y="508" font-size="11" fill="#64748b">核心层</text>
  <rect x="310" y="498" width="12" height="12" rx="2" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1"/>
  <text x="326" y="508" font-size="11" fill="#64748b">优化</text>
  <rect x="380" y="498" width="12" height="12" rx="2" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="396" y="508" font-size="11" fill="#64748b">输出</text>
  <line x1="460" y1="504" x2="490" y2="504" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="496" y="508" font-size="11" fill="#64748b">循环</text>
</svg>
