<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Encoder-Decoder 架构（翻译/摘要）</text>

  <!-- ============ Encoder (left column) ============ -->
  <text x="120" y="65" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Encoder（理解原句子）</text>

  <rect x="40" y="80" width="160" height="40" rx="6" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="120" y="105" text-anchor="middle" font-size="13" fill="#1e293b">原句子</text>

  <line x1="120" y1="120" x2="120" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="145" width="160" height="35" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="120" y="167" text-anchor="middle" font-size="12" fill="#1e293b">Positional Encoding</text>

  <line x1="120" y1="180" x2="120" y2="205" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="30" y="205" width="180" height="110" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="120" y="230" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Encoder Block × N</text>
  <text x="120" y="255" text-anchor="middle" font-size="12" fill="#475569">双向 Self-Attention</text>
  <text x="120" y="272" text-anchor="middle" font-size="11" fill="#94a3b8">（无因果掩码）</text>
  <text x="120" y="292" text-anchor="middle" font-size="12" fill="#475569">+ 残差 + LayerNorm</text>
  <text x="120" y="307" text-anchor="middle" font-size="12" fill="#475569">FFN + 残差 + LayerNorm</text>

  <line x1="120" y1="315" x2="120" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="340" width="160" height="40" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="120" y="364" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">encoder_output</text>

  <!-- Cross-Attention arrow from encoder_output to Decoder -->
  <line x1="200" y1="360" x2="310" y2="360" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <text x="250" y="352" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="bold">K,V = encoder</text>

  <!-- ============ Decoder (right column) ============ -->
  <text x="620" y="65" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Decoder（自回归逐词生成）</text>

  <!-- Loop box -->
  <rect x="390" y="75" width="460" height="510" rx="10" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Step 1 label -->
  <text x="620" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">循环开始：第1步输入 [&lt;BOS&gt;]</text>

  <rect x="510" y="115" width="220" height="35" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="620" y="137" text-anchor="middle" font-size="12" fill="#1e293b">Positional Encoding</text>

  <line x1="620" y1="150" x2="620" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="510" y="175" width="220" height="40" rx="6" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="620" y="200" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="bold">Self-Attention</text>
  <text x="620" y="210" text-anchor="middle" font-size="10" fill="#94a3b8">（因果掩码）</text>

  <line x1="620" y1="215" x2="620" y2="235" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="510" y="235" width="220" height="30" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="620" y="254" text-anchor="middle" font-size="12" fill="#1e293b">+ 残差连接 + LayerNorm</text>

  <line x1="620" y1="265" x2="620" y2="285" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="510" y="285" width="220" height="50" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="620" y="308" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="bold">Cross-Attention</text>
  <text x="620" y="325" text-anchor="middle" font-size="11" fill="#ef4444">Q=decoder ← K,V=encoder</text>

  <line x1="620" y1="335" x2="620" y2="355" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="510" y="355" width="220" height="30" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="620" y="374" text-anchor="middle" font-size="12" fill="#1e293b">+ 残差连接 + LayerNorm</text>

  <line x1="620" y1="385" x2="620" y2="405" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="510" y="405" width="220" height="35" rx="6" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="620" y="420" text-anchor="middle" font-size="12" fill="#1e293b">FFN</text>
  <text x="620" y="434" text-anchor="middle" font-size="10" fill="#94a3b8">+ 残差 + LayerNorm</text>

  <line x1="620" y1="440" x2="620" y2="460" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="530" y="460" width="180" height="35" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="620" y="482" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="bold">LM Head → vocab 概率</text>

  <line x1="620" y1="495" x2="620" y2="515" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="530" y="515" width="180" height="35" rx="6" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="620" y="537" text-anchor="middle" font-size="13" fill="#1e293b">取概率最大的 token</text>

  <!-- Loop back arrow -->
  <line x1="730" y1="533" x2="770" y2="533" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="770" y1="533" x2="770" y2="133" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="770" y1="133" x2="732" y2="133" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="780" y="340" font-size="12" fill="#94a3b8" transform="rotate(90, 780, 340)">拼回 Decoder 输入</text>

  <!-- Final output -->
  <line x1="620" y1="550" x2="620" y2="570" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="530" y="570" width="180" height="35" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="620" y="592" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">完整译文</text>

  <!-- Legend -->
  <rect x="30" y="400" width="340" height="120" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="45" y="422" font-size="12" font-weight="bold" fill="#475569">图例</text>
  <rect x="45" y="433" width="12" height="12" rx="2" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="62" y="443" font-size="11" fill="#64748b">输入 / Embedding</text>
  <rect x="45" y="452" width="12" height="12" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="62" y="462" font-size="11" fill="#64748b">Positional Encoding</text>
  <rect x="45" y="471" width="12" height="12" rx="2" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
  <text x="62" y="481" font-size="11" fill="#64748b">Attention / FFN 层</text>
  <rect x="180" y="433" width="12" height="12" rx="2" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="197" y="443" font-size="11" fill="#64748b">输出</text>
  <rect x="180" y="452" width="12" height="12" rx="2" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="197" y="462" font-size="11" fill="#64748b">Cross-Attention</text>
  <rect x="180" y="471" width="12" height="12" rx="2" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="197" y="481" font-size="11" fill="#64748b">残差连接</text>
  <line x1="45" y1="497" x2="75" y2="497" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="80" y="501" font-size="11" fill="#64748b">循环 / 数据流向</text>
</svg>
